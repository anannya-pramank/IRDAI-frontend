name: IRDAI watcher + loader

on:
  schedule:
    # 06:00 IST daily = 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      backfill:
        description: "Run watcher with --backfill (walk all pages)"
        type: boolean
        default: false
      refresh:
        description: "Run loader with --refresh (force re-extract + re-embed)"
        type: boolean
        default: false
      export_text:
        description: "Regenerate data/text/*.json from Supabase (one-time backfill for the Text tab)"
        type: boolean
        default: false
      limit:
        description: "Loader --limit (blank = no cap)"
        type: string
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 urllib3
          pip install psycopg2-binary pymupdf4llm pymupdf
          pip install sentence-transformers --extra-index-url https://download.pytorch.org/whl/cpu
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-hin
          echo "TESSDATA_PREFIX=$(dirname "$(find /usr/share -name eng.traineddata | head -1)")" >> "$GITHUB_ENV"

      - name: Cache MiniLM model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: minilm-l6-v2

      - name: Run watcher
        run: |
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            python irdai_watcher.py --backfill -v
          else
            python irdai_watcher.py -v
          fi

      - name: Run loader
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.refresh }}" = "true" ]; then ARGS="$ARGS --refresh"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          python load_irdai.py $ARGS -v

      - name: Export text payloads from Supabase (backfill)
        if: ${{ github.event.inputs.export_text == 'true' }}
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: python load_irdai.py --export-text -v

      - name: Build provision lineages
        run: python build_provisions.py

      - name: Commit updated corpus + logs
        run: |
          git config user.name "irdai-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/corpus.json data/irdai_master.csv data/docs.generated.js data/provisions.generated.js data/irdai_new_entries.json
          git add -A data/text
          git diff --cached --quiet || git commit -m "chore: irdai watcher/loader run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
