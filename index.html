<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRDAI Repository — Wiki Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#141414; --ink-soft:#444; --ink-faint:#767676;
    --page:#ffffff; --canvas:#f4f2ee;
    --line:#c9c3b3; --line-soft:#e2ded2;
    --wikiblue:#2f5aa8; --wikiblue-visited:#5a3696;
    --sidebar:#f1efe7; --sidebar-line:#d8d2bf;
    --infobox-bg:#f6f4ee; --infobox-head:#e6e1d1;
    --green:#3f6142; --green-bg:#e5ebe1;
    --rust:#8c3b2e; --rust-bg:#f1e2dd;
    --amber:#a3752b; --amber-bg:#f3e9d6;
    --brass:#8a6d24;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--canvas);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;}
  a{color:var(--wikiblue);text-decoration:none;cursor:pointer;}
  a:hover{text-decoration:underline;}
  ::selection{background:#d9e4f5;}

  /* ---------- Frame ---------- */
  .frame{display:grid;grid-template-columns:200px 1fr;min-height:100vh;}

  /* ---------- Sidebar ---------- */
  .sidebar{background:var(--sidebar);border-right:1px solid var(--sidebar-line);padding:16px 0;}
  .sb-brand{padding:0 16px 16px 16px;border-bottom:1px solid var(--sidebar-line);margin-bottom:14px;cursor:pointer;}
  .sb-brand .glyph{
    width:34px;height:34px;border-radius:4px;background:var(--ink);color:var(--page);
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:700;font-size:16px;margin-bottom:8px;
  }
  .sb-brand .name{font-family:'Fraunces',serif;font-weight:600;font-size:13.5px;line-height:1.25;}
  .sb-brand .sub{font-family:'IBM Plex Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);margin-top:3px;}
  .sb-group{padding:0 16px;margin-bottom:18px;}
  .sb-label{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);margin-bottom:7px;}
  .sb-group a, .sb-group button.sb-link{
    all:unset;display:block;font-size:12.5px;color:var(--ink-soft);padding:4px 0;cursor:pointer;
  }
  .sb-group a:hover, .sb-group button.sb-link:hover{color:var(--wikiblue);text-decoration:underline;}

  /* ---------- Main column ---------- */
  .col{max-width:900px;padding:0 30px 60px 30px;}
  .searchbar{
    display:flex;justify-content:flex-end;padding:14px 30px 0 30px;gap:10px;align-items:center;
  }
  .searchbar input{
    font-size:12.5px;padding:6px 10px 6px 26px;border:1px solid var(--line);border-radius:2px;
    background:var(--page);width:220px;
  }
  .searchbar-wrap{position:relative;}
  .searchbar-wrap svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:0.45;}

  .trail{font-size:11px;color:var(--ink-faint);padding:10px 30px 0 30px;display:flex;gap:6px;flex-wrap:wrap;}
  .trail a{color:var(--ink-faint);text-decoration:none;border-bottom:1px dotted var(--line);}
  .trail .sep{opacity:0.5;}

  /* ---------- Tabs ---------- */
  .tabs{display:flex;gap:2px;padding:18px 30px 0 30px;border-bottom:1px solid var(--line);}
  .tab-btn{
    all:unset;cursor:pointer;font-size:12.5px;font-weight:500;padding:8px 16px;color:var(--ink-soft);
    border:1px solid transparent;border-bottom:none;border-radius:3px 3px 0 0;
  }
  .tab-btn:hover{color:var(--ink);}
  .tab-btn.active{background:var(--page);border-color:var(--line);color:var(--ink);position:relative;top:1px;}

  .content{background:var(--page);border:1px solid var(--line);border-top:none;padding:0;}
  .pad{padding:24px 30px 40px 30px;}

  /* ---------- Article head ---------- */
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);}
  h1.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin:4px 0 2px 0;border-bottom:1px solid var(--line-soft);padding-bottom:10px;}
  .disambig{font-style:italic;color:var(--ink-faint);font-size:12.5px;margin:4px 0 14px 0;}
  .status-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:0.03em;padding:3px 9px;border-radius:20px;}
  .status-badge.existing{background:var(--green-bg);color:var(--green);}
  .status-badge.repealed{background:var(--rust-bg);color:var(--rust);}
  .status-badge.open{background:var(--amber-bg);color:var(--amber);}
  .status-badge.neutral{background:#eee;color:var(--ink-soft);}
  .status-badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

  .body-cols{display:flex;gap:28px;align-items:flex-start;}
  .body-main{flex:1;min-width:0;}

  /* ---------- Infobox ---------- */
  .infobox{
    width:246px;flex:none;border:1px solid var(--line);background:var(--infobox-bg);font-size:12px;
    margin:4px 0 14px 20px;float:right;
  }
  .infobox-head{background:var(--infobox-head);font-family:'Fraunces',serif;font-weight:600;font-size:13px;padding:8px 10px;border-bottom:1px solid var(--line);text-align:center;}
  .infobox-img{
    height:90px;background:repeating-linear-gradient(45deg,#e7e3d5,#e7e3d5 8px,#efece0 8px,#efece0 16px);
    display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:10px;font-family:'IBM Plex Mono',monospace;
    border-bottom:1px solid var(--line);
  }
  .infobox table{width:100%;border-collapse:collapse;}
  .infobox td{padding:6px 10px;border-top:1px solid var(--line-soft);vertical-align:top;}
  .infobox td.k{font-weight:600;width:36%;color:var(--ink-soft);font-size:11px;}
  .infobox td.v{font-size:11.5px;}
  .infobox .filename{font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.5;word-break:break-word;}

  /* ---------- TOC ---------- */
  .toc{
    display:inline-block;border:1px solid var(--line);background:#fafaf5;padding:12px 20px 12px 16px;
    margin:8px 0 20px 0;font-size:12.5px;max-width:340px;
  }
  .toc-title{font-weight:600;margin-bottom:6px;font-size:12.5px;}
  .toc ol{margin:0;padding-left:18px;}
  .toc li{padding:2px 0;}
  .toc a{color:var(--wikiblue);}

  /* ---------- Sections ---------- */
  h2.sec{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin:26px 0 10px 0;padding-bottom:5px;border-bottom:1px solid var(--line-soft);clear:both;}
  h2.sec .num{color:var(--ink-faint);font-weight:400;margin-right:6px;font-size:15px;}
  p.body-text{line-height:1.75;font-size:13.5px;color:var(--ink);margin:0 0 12px 0;}
  sup.cite{font-size:10px;}
  sup.cite a{color:var(--wikiblue);}

  table.provisions{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:8px;}
  table.provisions th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-faint);padding:6px 10px 8px 0;border-bottom:1px solid var(--line);}
  table.provisions td{padding:9px 10px 9px 0;border-bottom:1px solid var(--line-soft);vertical-align:top;}

  ul.link-list{list-style:none;margin:0;padding:0;}
  ul.link-list li{padding:8px 0;border-bottom:1px solid var(--line-soft);font-size:13px;line-height:1.5;}
  ul.link-list li:last-child{border-bottom:none;}
  .rel-tag{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-faint);display:block;margin-bottom:2px;}

  ol.refs{padding-left:20px;font-size:12px;color:var(--ink-soft);line-height:1.8;}
  ol.refs li a.back{margin-right:4px;}

  .empty-note{font-size:12.5px;color:var(--ink-faint);font-style:italic;padding:6px 0;}

  /* ---------- Categories footer ---------- */
  .categories{
    margin-top:30px;border-top:2px solid var(--line);padding-top:10px;font-size:11.5px;
    background:#fafaf5;
  }
  .categories .cat-label{font-weight:600;color:var(--ink-soft);margin-right:6px;}
  .categories a{margin-right:4px;}

  .page-footer{
    font-size:11px;color:var(--ink-faint);border-top:1px solid var(--line-soft);margin-top:16px;padding-top:10px;
  }

  /* ---------- Talk tab ---------- */
  .talk-entry{border-bottom:1px solid var(--line-soft);padding:14px 0;}
  .talk-entry:last-child{border-bottom:none;}
  .talk-meta{font-size:11px;color:var(--ink-faint);margin-bottom:4px;}
  .talk-meta b{color:var(--ink-soft);}
  .talk-body{font-size:13px;line-height:1.6;}
  .talk-signoff{font-size:11px;color:var(--ink-faint);margin-top:4px;}

  /* ---------- History tab ---------- */
  table.revtable{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.revtable th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-faint);padding:6px 10px 8px 0;border-bottom:1px solid var(--line);}
  table.revtable td{padding:9px 10px 9px 0;border-bottom:1px solid var(--line-soft);}
  .revdiff{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--wikiblue);}

  /* ---------- Category / listing / home ---------- */
  .cat-header h1{font-family:'Fraunces',serif;font-size:24px;margin:14px 0 6px 0;}
  .cat-header p{font-size:13px;color:var(--ink-soft);margin:0 0 18px 0;}
  .chiplist{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
  .chip{all:unset;cursor:pointer;font-size:11.5px;font-weight:500;padding:6px 12px;border-radius:20px;border:1px solid var(--line);color:var(--ink-soft);background:#fafaf5;}
  .chip.on{background:var(--ink);border-color:var(--ink);color:#fff;}
  .doc-grid{display:flex;flex-direction:column;}
  .doc-row{display:grid;grid-template-columns:1.6fr 1fr 0.6fr 0.9fr;gap:14px;align-items:center;padding:11px 0;border-bottom:1px solid var(--line-soft);text-decoration:none;color:inherit;}
  .doc-row:hover .rt{text-decoration:underline;}
  .doc-row .rt{font-size:13px;font-weight:500;color:var(--wikiblue);}
  .doc-row .re{font-size:11.5px;color:var(--ink-soft);}
  .doc-row .ry{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);}

  .home-hero{padding:20px 0 6px 0;}
  .home-hero h1{font-family:'Fraunces',serif;font-size:30px;margin:0 0 8px 0;}
  .home-hero p{font-size:13.5px;color:var(--ink-soft);max-width:64ch;line-height:1.65;margin:0 0 22px 0;}
  .cat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:30px;}
  .cat-card{all:unset;cursor:pointer;background:#fafaf5;border:1px solid var(--line);padding:14px 14px;}
  .cat-card:hover{border-color:var(--wikiblue);}
  .cat-card .n{font-family:'IBM Plex Mono',monospace;font-size:19px;color:var(--brass);}
  .cat-card .t{font-size:12.5px;font-weight:600;margin-top:3px;}

  @media(max-width:820px){
    .frame{grid-template-columns:1fr;}
    .sidebar{display:none;}
    .infobox{float:none;width:auto;margin-left:0;}
    .doc-row{grid-template-columns:1fr;gap:3px;}
  }
  :focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
</style>
</head>
<body>

<div class="frame">
  <nav class="sidebar">
    <div class="sb-brand" onclick="location.hash='#/'">
      <div class="glyph">IR</div>
      <div class="name">IRDAI Repository</div>
      <div class="sub">Wiki prototype</div>
    </div>
    <div class="sb-group">
      <div class="sb-label">Navigation</div>
      <a onclick="location.hash='#/'">Main page</a>
      <button class="sb-link" onclick="goRandom()">Random document</button>
      <button class="sb-link" onclick="location.hash='#/recent'">Recent classifications</button>
    </div>
    <div class="sb-group">
      <div class="sb-label">Browse by type</div>
      ${''}
      <span id="sbTypes"></span>
    </div>
    <div class="sb-group">
      <div class="sb-label">About</div>
      <span style="font-size:11.5px;color:var(--ink-faint);line-height:1.6;display:block;">Internal reference prototype. Placeholder data only — not sourced from live IRDAI issuances.</span>
    </div>
  </nav>

  <div>
    <div class="searchbar">
      <div class="searchbar-wrap">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#767676" stroke-width="2.4"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
        <input id="topSearchInput" type="text" placeholder="Search documents…">
      </div>
    </div>
    <div class="trail" id="trail"></div>
    <div class="col" id="col">
      <div class="tabs" id="tabs" style="display:none;">
        <button class="tab-btn" data-tab="article">Article</button>
        <button class="tab-btn" data-tab="talk">Talk</button>
        <button class="tab-btn" data-tab="history">View history</button>
      </div>
      <div class="content" id="contentWrap">
        <div class="pad" id="view"></div>
      </div>
    </div>
  </div>
</div>

<script>

    history:"Arose from a complaint-driven investigation into unregistered solicitation activity in a regional market.",

  "ord-reinsurer-2024": { type:"Orders", title:"Order in the matter of a Reinsurer — compliance directions", entity:"Insurers", subtype:"Reinsurers", status:"—", year:2024,
    lede:"Issues compliance directions to a reinsurer following an inspection under the Reinsurance Regulations.",
    history:"Followed a routine inspection cycle under the Life Insurance – Reinsurance Regulations.",
    relations:{ crossRef:["reg-reinsurance-2018"] } },
  "not-health-comments-2025": { type:"Notices", title:"Notice inviting comments on Health Insurance product design", entity:"Common", subtype:"By Subject", status:"—", year:2025,
    lede:"Invites stakeholder comments ahead of a proposed revision to health insurance product design norms.",
    history:"Part of a broader stakeholder consultation exercise preceding the next round of health product design reform.",
    relations:{} },
  "ed-imf-2026": { type:"Exposure Drafts", title:"Exposure Draft — IRDAI (Insurance Marketing Firms) Regulations, 2026", entity:"Intermediaries", subtype:"Insurance Marketing Firms (IMFs)", status:"Open for Comments", year:2026,
    lede:"Proposes a dedicated regulatory framework for insurance marketing firms, currently open for public comment.",
    history:"Follows several years of IMFs operating under interim circular-level guidance pending a dedicated regulation.",
    relations:{} },
  "ed-surveyors-2025": { type:"Exposure Drafts", title:"Exposure Draft — Amendments to Surveyors Regulations", entity:"Intermediaries", subtype:"Surveyors & Loss Assessors", status:"Comments Closed", year:2025,
    lede:"Proposed amendments to licensing norms for surveyors and loss assessors; the comment window has closed and finalisation is pending.",
    history:"Comment window closed after a standard consultation period; finalisation is pending as of this entry.",
    relations:{} },
  "ed-web-agg-2023": { type:"Exposure Drafts", title:"Exposure Draft — Master Circular on Web Aggregators", entity:"Intermediaries", subtype:"Web Aggregators", status:"Finalised", year:2023,
    lede:"The drafting-stage version of what was finalised as the Master Circular on Web Aggregators; retained here for drafting history.",
    history:"Circulated for comment before being finalised without material change to its core structure.",
    relations:{ finalisedAs:["mc-web-agg-2023"] } }
};

const TYPE_ORDER = ["Acts","Rules","Regulations","Master Circulars","Circulars","Guidelines","Orders","Notices","Exposure Drafts"];
const REL_LABELS = { repeals:"Repeals", repealedBy:"Repealed by", amends:"Amends", amendedBy:"Amended by", crossRef:"Cross-referenced by", finalises:"Finalises", finalisedAs:"Finalised as" };
const REL_INVERSE = { repeals:"repealedBy", repealedBy:"repeals", amends:"amendedBy", amendedBy:"amends", crossRef:"crossRef", finalises:"finalisedAs", finalisedAs:"finalises" };

/* deterministic pseudo-random helpers so placeholder talk/history stay stable per doc */
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){h=(h*31+s.charCodeAt(i))|0;} return Math.abs(h); }
const EDITORS = ["a.krishnan","r.iyer (Trilegal)","s.bose","classification-bot","m.rao","reviewer-2"];
const REV_SUMMARIES = ["Initial entry created","Marked entity classification","Added cross-reference","Flagged for repeal review","Corrected sub-category","Linked provisions to repealing instrument","Verified against IRDAI Legal section"];
const TALK_TEMPLATES = [
  "Should this be filed under {entity} only, or does it also touch Common given the cross-reference? Flagging for a second look.",
  "Confirmed the repeal linkage against the source PDF — looks correct, no changes needed.",
  "Sub-category feels borderline between {sub} and a neighbouring category. Leaving as-is for now but worth revisiting during the next classification pass.",
  "Naming convention on this one should probably shorten the title — full title makes for an unwieldy filename.",
];

function synthHistory(id){
  const h = hashStr(id);
  const n = 2 + (h % 2); // 2-3 revisions
  const revs = [];
  const baseYear = DOCS[id].year;
  for(let i=0;i<n;i++){
    const editor = EDITORS[(h+i*7)%EDITORS.length];
    const summary = REV_SUMMARIES[(h+i*13)%REV_SUMMARIES.length];
    const day = 3 + ((h+i*5)%24);
    revs.push({date:`${String(day).padStart(2,'0')} Jun ${Math.min(2026, baseYear+i+1)}`, editor, summary});
  }
  return revs.reverse();
}
function synthTalk(id){
  const h = hashStr(id);
  const n = h % 3; // 0-2 comments
  const d = DOCS[id];
  const items = [];
  for(let i=0;i<n;i++){
    const t = TALK_TEMPLATES[(h+i*3)%TALK_TEMPLATES.length]
      .replace('{entity}', d.entity).replace('{sub}', (d.subtype||'').split(',')[0]||'this category');
    items.push({ author: EDITORS[(h+i*11)%EDITORS.length], text: t, date: `${8+((h+i*4)%20)} Jun ${d.year+1}` });
  }
  return items;
}

/* ===================== Nav trail ===================== */
let trailStack = [];
function pushTrail(id){ if(trailStack[trailStack.length-1]===id) return; trailStack.push(id); if(trailStack.length>6) trailStack.shift(); }
function renderTrail(currentId){
  const el = document.getElementById('trail');
  if(!currentId || trailStack.length<2){ el.innerHTML=''; return; }
  const crumbs = trailStack.slice(0,-1).map(id=>{
    const d = DOCS[id];
    return d ? `<a onclick="location.hash='#/doc/${id}'">${d.title.length>34?d.title.slice(0,34)+'…':d.title}</a>` : '';
  }).filter(Boolean);
  el.innerHTML = crumbs.join('<span class="sep">→</span>') + (crumbs.length? '<span class="sep">→</span> <strong>current</strong>' : '');
}

/* ===================== Helpers ===================== */
function statusClass(status){
  if(status==="Existing") return "existing";
  if(status && status.toLowerCase().includes("repeal")) return "repealed";
  if(["Open for Comments","Comments Closed","Finalised"].includes(status)) return "open";
  return "neutral";
}
function badge(status){ return `<span class="status-badge ${statusClass(status)}"><span class="dot"></span>${status}</span>`; }
function docLink(id, label){ const d = DOCS[id]; if(!d) return label||id; return `<a onclick="location.hash='#/doc/${id}'">${label||d.title}</a>`; }
function backlinksFor(id){
  const found = {};
  Object.entries(DOCS).forEach(([oid,d])=>{
    if(oid===id) return;
    Object.entries(d.relations||{}).forEach(([relType,targets])=>{
      if(targets.includes(id)){
        const inv = REL_INVERSE[relType] || relType;
        found[inv] = found[inv] || [];
        found[inv].push(oid);
      }
    });
  });
  return found;
}
function catLink(label, kind){
  return `<a onclick="location.hash='#/type/${encodeURIComponent(kind==='type'?label:'')}'${kind!=='type'?`; return false;`:''}">${label}</a>`;
}

/* ===================== Sidebar type list ===================== */
document.getElementById('sbTypes').innerHTML = TYPE_ORDER.map(t=>
  `<button class="sb-link" onclick="location.hash='#/type/${encodeURIComponent(t)}'">${t}</button>`
).join('');

function goRandom(){
  const ids = Object.keys(DOCS);
  const id = ids[Math.floor(Math.random()*ids.length)];
  location.hash = '#/doc/'+id;
}

/* ===================== Views ===================== */
function showTabs(show){ document.getElementById('tabs').style.display = show ? 'flex' : 'none'; }
function setActiveTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
}

function viewHome(){
  showTabs(false);
  document.getElementById('trail').innerHTML='';
  const counts = {}; TYPE_ORDER.forEach(t=>counts[t]=0);
  Object.values(DOCS).forEach(d=>counts[d.type]=(counts[d.type]||0)+1);
  const recent = Object.entries(DOCS).sort((a,b)=>b[1].year-a[1].year).slice(0,6);
  document.getElementById('view').innerHTML = `
    <div class="home-hero">
      <h1>The IRDAI Regulatory Repository</h1>
      <p>A hyperlinked reference for IRDAI regulatory material. Every entry links to what repeals it, what it cross-references, and what it finalises — trace a provision's lineage without leaving the page. All content below is placeholder data for prototyping only.</p>
    </div>
    <h2 class="sec" style="border:none;margin-top:0;"><span class="num"></span>Browse by document type</h2>
    <div class="cat-cards">
      ${TYPE_ORDER.map(t=>`<button class="cat-card" onclick="location.hash='#/type/${encodeURIComponent(t)}'"><div class="n">${counts[t]}</div><div class="t">${t}</div></button>`).join('')}
    </div>
    <h2 class="sec"><span class="num"></span>Recently issued</h2>
    <div class="doc-grid">${recent.map(([id,d])=>docRow(id,d)).join('')}</div>
  `;
}
function docRow(id,d){
  return `<a class="doc-row" onclick="location.hash='#/doc/${id}'">
    <span class="rt">${d.title}</span>
    <span class="re">${d.entity}${d.subtype && d.subtype!=='—' ? ' · '+d.subtype.split(',')[0] : ''}</span>
    <span class="ry">${d.year}</span>
    <span>${badge(d.status)}</span>
  </a>`;
}
function viewCategory(type){
  showTabs(false);
  document.getElementById('trail').innerHTML='';
  const all = Object.entries(DOCS).filter(([id,d])=>d.type===type).sort((a,b)=>b[1].year-a[1].year);
  document.getElementById('view').innerHTML = `
    <div class="cat-header"><h1>${type}</h1><p>${all.length} document${all.length===1?'':'s'} classified under this document type.</p></div>
    <div class="chiplist">${TYPE_ORDER.map(t=>`<button class="chip ${t===type?'on':''}" onclick="location.hash='#/type/${encodeURIComponent(t)}'">${t}</button>`).join('')}</div>
    <div class="doc-grid">${all.length ? all.map(([id,d])=>docRow(id,d)).join('') : '<div class="empty-note">No documents in this category yet.</div>'}</div>
  `;
}
function viewRecent(){
  showTabs(false);
  document.getElementById('trail').innerHTML='';
  const all = Object.entries(DOCS).sort((a,b)=>b[1].year-a[1].year);
  document.getElementById('view').innerHTML = `
    <div class="cat-header"><h1>Recent classifications</h1><p>All entries, most recently issued first.</p></div>
    <div class="doc-grid">${all.map(([id,d])=>docRow(id,d)).join('')}</div>
  `;
}
function viewSearch(q){
  showTabs(false);
  document.getElementById('trail').innerHTML='';
  const query=(q||'').toLowerCase();
  const results = Object.entries(DOCS).filter(([id,d])=>(d.title+" "+d.entity+" "+d.subtype+" "+d.type+" "+d.year).toLowerCase().includes(query));
  document.getElementById('view').innerHTML = `
    <div class="cat-header"><h1>Search results</h1><p>${results.length} match${results.length===1?'':'es'} for "${q}"</p></div>
    <div class="doc-grid">${results.length ? results.map(([id,d])=>docRow(id,d)).join('') : '<div class="empty-note">No documents matched.</div>'}</div>
  `;
}

let currentDocId = null;
let currentTab = 'article';

function viewDoc(id, tab){
  const d = DOCS[id];
  currentDocId = id;
  currentTab = tab || 'article';
  showTabs(true);
  setActiveTab(currentTab);

  if(!d){
    document.getElementById('view').innerHTML = `<div class="cat-header"><h1>Not found</h1><p>No document with id "${id}".</p></div>`;
    return;
  }
  pushTrail(id);
  renderTrail(id);

  if(currentTab==='talk'){ renderTalkTab(id,d); return; }
  if(currentTab==='history'){ renderHistoryTab(id,d); return; }
  renderArticleTab(id,d);
}

function renderArticleTab(id,d){
  const rel = d.relations || {};
  const back = backlinksFor(id);
  const combined = {};
  Object.entries(rel).forEach(([k,v])=>{ combined[k]=[...new Set([...(combined[k]||[]),...v])]; });
  Object.entries(back).forEach(([k,v])=>{ combined[k]=[...new Set([...(combined[k]||[]),...v])]; });
  const relEntries = Object.entries(combined).filter(([k,v])=>v.length && REL_LABELS[k]);

  const provisionsHtml = d.provisions ? `
    <h2 class="sec"><span class="num">2</span>Provisions</h2>
    <table class="provisions">
      <thead><tr><th>Provision</th><th>Description</th><th>Status</th></tr></thead>
      <tbody>
        ${d.provisions.map(p=>`<tr><td><strong>${p.ref}</strong></td><td>${p.desc}</td>
          <td>${badge(p.status)}${p.repealedBy?`<br><span style="font-size:11px;">→ ${docLink(p.repealedBy,'repealed by '+DOCS[p.repealedBy].title)}</span>`:''}</td></tr>`).join('')}
      </tbody>
    </table>` : '';

  const secNums = { overview:1, provisions: d.provisions?2:null, history: d.provisions?3:2, related:(d.provisions?4:3), refs:(d.provisions?5:4) };

  const toc = `
    <div class="toc">
      <div class="toc-title">Contents</div>
      <ol>
        <li><a onclick="scrollToSec('sec-overview');return false;">Overview</a></li>
        ${d.provisions?`<li><a onclick="scrollToSec('sec-provisions');return false;">Provisions</a></li>`:''}
        <li><a onclick="scrollToSec('sec-history');return false;">Legislative history</a></li>
        <li><a onclick="scrollToSec('sec-related');return false;">Related documents</a></li>
        <li><a onclick="scrollToSec('sec-refs');return false;">References</a></li>
      </ol>
    </div>`;

  const references = [
    "IRDAI, Legal Section — document register (placeholder source).",
    "Internal classification note, Document Classification Matrix, Jul 2026."
  ];

  document.getElementById('view').innerHTML = `
    <div class="kicker">${d.type} → ${d.entity}${d.subtype && d.subtype!=='—' ? ' → '+d.subtype : ''}</div>
    <h1 class="page-title">${d.title}</h1>
    <div class="disambig">${d.type} · ${d.year} · placeholder entry</div>
    <div style="margin:0 0 12px 0;">${badge(d.status)}</div>

    <div class="body-cols">
      <div class="body-main">
        <aside class="infobox">
          <div class="infobox-head">${d.title.length>40?d.title.slice(0,40)+'…':d.title}</div>
          <div class="infobox-img">no image on file</div>
          <table>
            <tr><td class="k">Type</td><td class="v">${d.type}</td></tr>
            <tr><td class="k">Status</td><td class="v">${badge(d.status)}</td></tr>
            <tr><td class="k">Entity</td><td class="v">${d.entity}</td></tr>
            <tr><td class="k">Sub-category</td><td class="v">${d.subtype}</td></tr>
            <tr><td class="k">Year</td><td class="v">${d.year}</td></tr>
            <tr><td class="k">Filename</td><td class="v filename">${d.type} – ${d.entity} – ${d.title.split('—')[0].trim()} – ${d.year}</td></tr>
          </table>
        </aside>

        ${toc}

        <h2 class="sec" id="sec-overview"><span class="num">1</span>Overview</h2>
        <p class="body-text">${d.lede}<sup class="cite"><a onclick="scrollToSec('sec-refs');return false;">[1]</a></sup></p>

        ${provisionsHtml.replace('id="sec-provisions"','').replace('<h2 class="sec">','<h2 class="sec" id="sec-provisions">')}

        <h2 class="sec" id="sec-history"><span class="num">${d.provisions?3:2}</span>Legislative history</h2>
        <p class="body-text">${d.history}<sup class="cite"><a onclick="scrollToSec('sec-refs');return false;">[2]</a></sup></p>

        <h2 class="sec" id="sec-related"><span class="num">${d.provisions?4:3}</span>Related documents</h2>
        <ul class="link-list">
          ${relEntries.length ? relEntries.map(([k,ids])=>`<li><span class="rel-tag">${REL_LABELS[k]}</span>${ids.map(rid=>docLink(rid)).join(', ')}</li>`).join('') : '<li class="empty-note">No recorded relationships for this document.</li>'}
        </ul>

        <h2 class="sec" id="sec-refs"><span class="num">${d.provisions?5:4}</span>References</h2>
        <ol class="refs">
          ${references.map((r,i)=>`<li id="ref-${i+1}">${r}</li>`).join('')}
        </ol>

        <div class="categories">
          <div style="padding:8px 12px;"><span class="cat-label">Categories:</span>
            <a onclick="location.hash='#/type/${encodeURIComponent(d.type)}'">${d.type}</a> ·
            <a onclick="location.hash='#/type/${encodeURIComponent(d.type)}'">${d.entity}</a>
            ${d.subtype && d.subtype!=='—' ? ' · <a onclick="return false;">'+d.subtype.split(',')[0]+'</a>' : ''}
            ${statusClass(d.status)==='repealed' ? ' · <a onclick="return false;">Repealed instruments</a>' : ''}
          </div>
        </div>
        <div class="page-footer">This entry was last classified based on placeholder data. Not sourced from a live IRDAI issuance.</div>
      </div>
    </div>
  `;
}

function renderTalkTab(id,d){
  const items = synthTalk(id);
  document.getElementById('view').innerHTML = `
    <div class="kicker">Talk</div>
    <h1 class="page-title" style="font-size:22px;">Talk: ${d.title}</h1>
    <div class="disambig">Discussion regarding classification of this entry.</div>
    <div style="margin-top:16px;">
      ${items.length ? items.map(c=>`
        <div class="talk-entry">
          <div class="talk-meta"><b>${c.author}</b> · ${c.date}</div>
          <div class="talk-body">${c.text}</div>
          <div class="talk-signoff">— ${c.author}</div>
        </div>`).join('') : '<div class="empty-note">No discussion yet on this entry.</div>'}
    </div>
  `;
}

function renderHistoryTab(id,d){
  const revs = synthHistory(id);
  document.getElementById('view').innerHTML = `
    <div class="kicker">View history</div>
    <h1 class="page-title" style="font-size:22px;">Revision history: ${d.title}</h1>
    <table class="revtable">
      <thead><tr><th>Date</th><th>Editor</th><th>Summary</th><th></th></tr></thead>
      <tbody>
        ${revs.map((r,i)=>`<tr><td>${r.date}</td><td>${r.editor}</td><td>${r.summary}</td><td class="revdiff">${i===0?'current':'diff'}</td></tr>`).join('')}
      </tbody>
    </table>
  `;
}

function scrollToSec(id){
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

/* tab clicks */
document.getElementById('tabs').addEventListener('click', e=>{
  const btn = e.target.closest('.tab-btn');
  if(!btn || !currentDocId) return;
  location.hash = '#/doc/'+currentDocId + (btn.dataset.tab==='article' ? '' : '/'+btn.dataset.tab);
});

/* ===================== Router ===================== */
function router(){
  const hash = location.hash || '#/';
  const [pathPart, queryPart] = hash.replace(/^#\//,'').split('?');
  const parts = pathPart.split('/').filter(Boolean);

  if(parts.length===0){ viewHome(); return; }
  if(parts[0]==='type' && parts[1]){ viewCategory(decodeURIComponent(parts[1])); return; }
  if(parts[0]==='recent'){ viewRecent(); return; }
  if(parts[0]==='search'){ const q=new URLSearchParams(queryPart||'').get('q')||''; viewSearch(q); return; }
  if(parts[0]==='doc' && parts[1]){ viewDoc(decodeURIComponent(parts[1]), parts[2]||'article'); return; }
  viewHome();
}
window.addEventListener('hashchange', router);
document.getElementById('topSearchInput').addEventListener('keydown', e=>{
  if(e.key==='Enter' && e.target.value.trim()) location.hash = '#/search?q='+encodeURIComponent(e.target.value.trim());
});
router();
</script>
