<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRDAI Repository — Wiki Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#151d24; --ink-soft:#3c4750; --ink-faint:#6b7580;
    --paper:#efeee8; --paper-raised:#f8f7f3;
    --line:#d7d3c6; --line-strong:#b9b4a4;
    --brass:#8a6d24; --brass-bg:#f1e9d1; --link:#5c4a1a;
    --green:#3f6142; --green-bg:#e5ebe1;
    --rust:#8c3b2e; --rust-bg:#f1e2dd;
    --amber:#a3752b; --amber-bg:#f3e9d6;
    --radius:3px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  a{color:var(--link);}
  ::selection{background:var(--brass-bg);}

  .topbar{
    background:var(--ink);color:var(--paper);
    display:flex;align-items:center;gap:18px;
    padding:12px 24px;position:sticky;top:0;z-index:20;
  }
  .brand{
    font-family:'Fraunces',serif;font-weight:600;font-size:16px;
    cursor:pointer;white-space:nowrap;letter-spacing:0.01em;
  }
  .brand small{display:block;font-family:'IBM Plex Mono',monospace;font-weight:400;font-size:9px;letter-spacing:0.1em;color:var(--brass-bg);text-transform:uppercase;margin-top:2px;}
  .topsearch{flex:1;max-width:480px;position:relative;}
  .topsearch input{
    width:100%;font-size:13px;padding:8px 12px 8px 30px;
    border:1px solid rgba(239,238,232,0.25);border-radius:20px;
    background:rgba(239,238,232,0.08);color:var(--paper);
  }
  .topsearch input::placeholder{color:rgba(239,238,232,0.5);}
  .topsearch input:focus{outline:none;background:var(--paper-raised);color:var(--ink);}
  .topsearch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:0.55;pointer-events:none;}
  .topnav{display:flex;gap:14px;font-size:11.5px;font-weight:500;}
  .topnav a{color:rgba(239,238,232,0.75);text-decoration:none;cursor:pointer;white-space:nowrap;}
  .topnav a:hover{color:var(--paper);}

  .shell{max-width:1080px;margin:0 auto;padding:0 28px;}

  /* breadcrumb / trail */
  .trail{
    font-size:11.5px;color:var(--ink-faint);
    padding:14px 0 0 0;display:flex;gap:6px;flex-wrap:wrap;align-items:center;
  }
  .trail a{color:var(--ink-faint);text-decoration:none;border-bottom:1px dotted var(--line-strong);}
  .trail a:hover{color:var(--link);}
  .trail .sep{opacity:0.5;}

  /* ---------- Article layout ---------- */
  .article{display:grid;grid-template-columns:1fr 280px;gap:36px;padding:18px 0 70px 0;align-items:start;}
  .article h1{font-family:'Fraunces',serif;font-size:30px;font-weight:600;line-height:1.2;margin:0 0 4px 0;letter-spacing:-0.01em;}
  .article .kicker{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);margin-bottom:16px;}
  .status-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:0.03em;padding:4px 9px;border-radius:20px;}
  .status-badge.existing{background:var(--green-bg);color:var(--green);}
  .status-badge.repealed{background:var(--rust-bg);color:var(--rust);}
  .status-badge.open{background:var(--amber-bg);color:var(--amber);}
  .status-badge.neutral{background:var(--paper-raised);color:var(--ink-soft);border:1px solid var(--line-strong);}
  .status-badge .dot{width:5px;height:5px;border-radius:50%;background:currentColor;}

  .lede{font-size:14.5px;line-height:1.7;color:var(--ink-soft);margin:14px 0 26px 0;max-width:62ch;}

  .section-title{
    font-family:'Fraunces',serif;font-size:16px;font-weight:600;
    margin:30px 0 12px 0;padding-bottom:6px;border-bottom:1px solid var(--line);
  }

  .provisions{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:8px;}
  .provisions th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-faint);padding:6px 10px 8px 0;border-bottom:1px solid var(--line-strong);}
  .provisions td{padding:9px 10px 9px 0;border-bottom:1px solid var(--line);vertical-align:top;}
  .provisions .prov-status{white-space:nowrap;}

  .link-list{list-style:none;margin:0;padding:0;}
  .link-list li{padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.5;}
  .link-list li:last-child{border-bottom:none;}
  .link-list a.doc-link{font-weight:500;text-decoration:none;}
  .link-list a.doc-link:hover{text-decoration:underline;}
  .rel-tag{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-faint);display:block;margin-bottom:2px;}

  .empty-note{font-size:12.5px;color:var(--ink-faint);font-style:italic;padding:6px 0;}

  /* infobox */
  .infobox{
    background:var(--paper-raised);border:1px solid var(--line-strong);
    border-radius:var(--radius);padding:16px 18px;font-size:12.5px;
    position:sticky;top:70px;
  }
  .infobox-title{font-family:'Fraunces',serif;font-weight:600;font-size:14px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line);}
  .infobox dl{margin:0;}
  .infobox dt{font-family:'IBM Plex Mono',monospace;font-size:9.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-faint);margin-top:11px;}
  .infobox dt:first-child{margin-top:0;}
  .infobox dd{margin:2px 0 0 0;color:var(--ink);}
  .infobox .filename{font-family:'IBM Plex Mono',monospace;font-size:10.5px;line-height:1.5;color:var(--ink-soft);word-break:break-word;}

  /* category / listing */
  .cat-header{padding:20px 0 4px 0;}
  .cat-header h1{font-family:'Fraunces',serif;font-size:26px;margin:0 0 6px 0;}
  .cat-header p{font-size:13px;color:var(--ink-soft);margin:0 0 20px 0;}
  .chiplist{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
  .chip{
    all:unset;cursor:pointer;font-size:11.5px;font-weight:500;padding:6px 12px;border-radius:20px;
    border:1px solid var(--line-strong);color:var(--ink-soft);background:var(--paper-raised);
  }
  .chip.on{background:var(--ink);border-color:var(--ink);color:var(--paper);}
  .doc-grid{display:flex;flex-direction:column;}
  .doc-row{
    display:grid;grid-template-columns:1.6fr 1fr 0.6fr 0.9fr;gap:14px;align-items:center;
    padding:13px 0;border-bottom:1px solid var(--line);text-decoration:none;color:inherit;
  }
  .doc-row:hover .rt{text-decoration:underline;}
  .doc-row .rt{font-size:13px;font-weight:500;color:var(--ink);}
  .doc-row .re{font-size:11.5px;color:var(--ink-soft);}
  .doc-row .ry{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);}

  /* home */
  .home-hero{padding:40px 0 10px 0;}
  .home-hero h1{font-family:'Fraunces',serif;font-size:34px;margin:0 0 8px 0;letter-spacing:-0.01em;}
  .home-hero p{font-size:13.5px;color:var(--ink-soft);max-width:60ch;line-height:1.6;margin:0 0 26px 0;}
  .cat-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:36px;}
  .cat-card{
    all:unset;cursor:pointer;background:var(--paper-raised);border:1px solid var(--line-strong);
    border-radius:var(--radius);padding:16px 16px;
  }
  .cat-card:hover{border-color:var(--brass);}
  .cat-card .n{font-family:'IBM Plex Mono',monospace;font-size:20px;color:var(--brass);}
  .cat-card .t{font-size:12.5px;font-weight:600;margin-top:4px;}
  .home-recent .section-title{margin-top:0;}

  @media(max-width:760px){
    .article{grid-template-columns:1fr;}
    .infobox{position:static;}
    .cat-cards{grid-template-columns:repeat(2,1fr);}
    .doc-row{grid-template-columns:1fr;gap:4px;}
    .topnav{display:none;}
  }
  :focus-visible{outline:2px solid var(--brass);outline-offset:2px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand" onclick="location.hash='#/'">IRDAI Repository<small>Wiki prototype</small></div>
  <div class="topsearch">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.6" y2="16.6"/></svg>
    <input id="topSearchInput" type="text" placeholder="Search documents…">
  </div>
  <div class="topnav">
    <a onclick="location.hash='#/'">Home</a>
    <a onclick="location.hash='#/type/Regulations'">Regulations</a>
    <a onclick="location.hash='#/type/Orders'">Orders</a>
  </div>
</div>

<div class="shell">
  <div class="trail" id="trail"></div>
  <div id="view"></div>
</div>

<script>
/* ===================== MOCK DATA ===================== */
/* relation keys point to other doc ids. Backlinks are computed, not stored redundantly. */
const DOCS = {
  "act-insurance-1938": {

    relations:{}

  "cir-broker-networth-2024": {
    type:"Circulars", title:"Circular on Revised Net Worth Norms for Insurance Brokers", entity:"Intermediaries", subtype:"Insurance Brokers",
    status:"Existing", year:2024,

    relations:{ repeals:["reg-brokers-2018"], crossRef:["act-insurance-1938"] }
  },
  "reg-corp-agents-2015": {
    type:"Regulations", title:"IRDAI (Registration of Corporate Agents) Regulations", entity:"Intermediaries", subtype:"Corporate Agents",
    status:"Existing", year:2015,
    lede:"Governs the registration, tenure, and permissible tie-ups of corporate agents distributing insurance products on behalf of insurers.",
    relations:{}
  },
  "reg-tpa-2016": {
    type:"Regulations", title:"IRDAI (Third Party Administrators – Health Services) Regulations", entity:"Intermediaries", subtype:"Third Party Administrators (TPAs)",
    status:"Existing", year:2016,
    lede:"Regulates entities providing claims processing and health services administration on behalf of insurers.",
    relations:{ crossRef:["cir-tpa-tat-2019"] }
  },
  "reg-reinsurance-2018": {
    type:"Regulations", title:"IRDAI (Life Insurance – Reinsurance) Regulations", entity:"Insurers", subtype:"Reinsurers",
    status:"Existing", year:2018,
    lede:"Prescribes reinsurance cession norms and reporting obligations for life insurers and reinsurers operating in India.",
    relations:{ repeals:["reg-gi-reinsurance-2000"] }
  },
  "reg-gi-reinsurance-2000": {
    type:"Regulations", title:"IRDAI (General Insurance – Reinsurance) Regulations, 2000", entity:"Insurers", subtype:"General Insurers",
    status:"Repealed", year:2000,
    lede:"The earlier reinsurance framework for general insurers, retained here for historical and litigation reference only.",
    relations:{ repealedBy:["reg-reinsurance-2018"] }
  },
  "reg-health-proposal-2020": {
    type:"Regulations", title:"IRDAI (Standard Proposal Form for Health Insurance) Regulations", entity:"Insurers", subtype:"Standalone Health Insurers",
    status:"Existing", year:2020,
    lede:"Standardises the proposal form used across health insurers to improve comparability of disclosures at the point of sale.",
    relations:{ crossRef:["gl-health-filing-2024"] }
  },
  "mc-web-agg-2023": {
    type:"Master Circulars", title:"Master Circular on Web Aggregators", entity:"Intermediaries", subtype:"Web Aggregators",
    status:"Existing", year:2023,
    lede:"Consolidates prior circulars on web aggregator registration, display of insurer quotes, and grievance redressal into a single reference instrument.",
    relations:{ finalises:["ed-web-agg-2023"] }
  },
  "mc-life-products-2024": {
    type:"Master Circulars", title:"Master Circular on Life Insurance Products", entity:"Insurers", subtype:"Life Insurers",
    status:"Existing", year:2024,
    lede:"Sets out product design, surrender value, and disclosure norms applicable to life insurance products.",
    relations:{ crossRef:["cir-bancassurance-2022"] }
  },
  "mc-corp-gov-2024": {
    type:"Master Circulars", title:"Master Circular on Corporate Governance for Insurers", entity:"Insurers", subtype:"Life Insurers, General Insurers, Standalone Health Insurers",
    status:"Existing", year:2024,
    lede:"Consolidated governance requirements covering board composition, committee structures, and fit-and-proper norms for insurers.",
    relations:{}
  },
  "mc-surveyors-2017": {
    type:"Master Circulars", title:"Master Circular on Surveyors and Loss Assessors", entity:"Intermediaries", subtype:"Surveyors & Loss Assessors",
    status:"Repealed", year:2017,
    lede:"Earlier consolidated guidance for licensed surveyors, superseded by a later consolidated circular covering the same subject matter.",
    relations:{}
  },
  "cir-bancassurance-2022": {

    status:"Existing", year:2022,
    lede:"Prescribes the periodic reporting format for bancassurance channel business, read together with the Master Circular on Life Insurance Products.",
    relations:{ crossRef:["mc-life-products-2024"] }
  },
  "cir-imf-onboarding-2023": {

    status:"Existing", year:2023,
    lede:"Fixes the timelines within which insurance marketing firms must complete onboarding formalities with tied insurers.",
    relations:{}
  },
  "cir-tpa-tat-2019": {
    type:"Circulars", title:"Circular on TPA Claim Settlement TAT", entity:"Intermediaries", subtype:"Third Party Administrators (TPAs)",
    status:"Non-existing / Repealed", year:2019,
    lede:"Set turnaround-time benchmarks for TPA-administered health claims; superseded by later service-level norms issued under the TPA Regulations.",
    relations:{}
  },
  "gl-repositories-2015": {
    type:"Guidelines", title:"Guidelines on Insurance Repositories", entity:"Intermediaries", subtype:"Insurance Repositories",
    status:"Existing", year:2015,
    lede:"Sets out eligibility, functions, and data security obligations for entities operating as insurance repositories holding policies in electronic form.",
    relations:{}
  },
  "gl-health-filing-2024": {
    type:"Guidelines", title:"Guidelines on Product Filing Procedure – Health", entity:"Insurers", subtype:"Standalone Health Insurers",
    status:"Existing", year:2024,
    lede:"Details the file-and-use procedure and supporting documentation required for health insurance product approval.",
    relations:{ crossRef:["reg-health-proposal-2020"] }
  },
  "gl-advertisement-2021": {
    type:"Guidelines", title:"Guidelines on Advertisement, Promotion and Publicity", entity:"Common", subtype:"Applicable across multiple regulated entities",
    status:"Existing", year:2021,
    lede:"Governs permissible content, disclosures, and approval requirements for insurance-related advertising across all regulated entities.",
    relations:{}
  },
  "gl-group-2005": {
    type:"Guidelines", title:"Guidelines on Group Insurance Policies", entity:"Insurers", subtype:"General Insurers",
    status:"Repealed", year:2005,
    lede:"Earlier framework for group policy administration, retained for transitional and litigation reference.",
    relations:{}
  },

    type:"Orders", title:"Order in the matter of a Broker Entity — licence suspension", entity:"Intermediaries", subtype:"Insurance Brokers",
    status:"—", year:2023,

    relations:{ crossRef:["reg-brokers-2018"] }
  },
  "ord-unregistered-2022": {
    type:"Orders", title:"Order against an unregistered entity soliciting insurance business", entity:"Others", subtype:"Others (as required)",
    status:"—", year:2022,
    lede:"Directs cessation of insurance solicitation activity by an entity found to be operating without the requisite registration.",
    relations:{}
  },
  "ord-reinsurer-2024": {
    type:"Orders", title:"Order in the matter of a Reinsurer — compliance directions", entity:"Insurers", subtype:"Reinsurers",
    status:"—", year:2024,
    lede:"Issues compliance directions to a reinsurer following an inspection under the Reinsurance Regulations.",
    relations:{ crossRef:["reg-reinsurance-2018"] }
  },
  "not-health-comments-2025": {
    type:"Notices", title:"Notice inviting comments on Health Insurance product design", entity:"Common", subtype:"By Subject",
    status:"—", year:2025,
    lede:"Invites stakeholder comments ahead of a proposed revision to health insurance product design norms.",
    relations:{}
  },
  "ed-imf-2026": {
    type:"Exposure Drafts", title:"Exposure Draft — IRDAI (Insurance Marketing Firms) Regulations, 2026", entity:"Intermediaries", subtype:"Insurance Marketing Firms (IMFs)",
    status:"Open for Comments", year:2026,
    lede:"Proposes a dedicated regulatory framework for insurance marketing firms, currently open for public comment.",
    relations:{}
  },
  "ed-surveyors-2025": {
    type:"Exposure Drafts", title:"Exposure Draft — Amendments to Surveyors Regulations", entity:"Intermediaries", subtype:"Surveyors & Loss Assessors",
    status:"Comments Closed", year:2025,
    lede:"Proposed amendments to licensing norms for surveyors and loss assessors; the comment window has closed and finalisation is pending.",
    relations:{}
  },
  "ed-web-agg-2023": {
    type:"Exposure Drafts", title:"Exposure Draft — Master Circular on Web Aggregators", entity:"Intermediaries", subtype:"Web Aggregators",
    status:"Finalised", year:2023,
    lede:"The drafting-stage version of what was finalised as the Master Circular on Web Aggregators; retained here for drafting history.",
    relations:{ finalisedAs:["mc-web-agg-2023"] }
  }
};

const TYPE_ORDER = ["Acts","Rules","Regulations","Master Circulars","Circulars","Guidelines","Orders","Notices","Exposure Drafts"];
const REL_LABELS = {
  repeals:"Repeals", repealedBy:"Repealed by",
  amends:"Amends", amendedBy:"Amended by",
  crossRef:"Cross-referenced by", finalises:"Finalises", finalisedAs:"Finalised as"
};
const REL_INVERSE = { repeals:"repealedBy", repealedBy:"repeals", amends:"amendedBy", amendedBy:"amends", crossRef:"crossRef", finalises:"finalisedAs", finalisedAs:"finalises" };

/* ===================== Nav trail (session stack, distinct from browser history) ===================== */
let trailStack = [];
function pushTrail(id){
  if(trailStack[trailStack.length-1] === id) return;
  trailStack.push(id);
  if(trailStack.length > 6) trailStack.shift();
}
function renderTrail(currentId){
  const el = document.getElementById('trail');
  if(!currentId || trailStack.length < 2){ el.innerHTML=''; return; }
  const crumbs = trailStack.slice(0,-1).map(id=>{
    const d = DOCS[id];
    return d ? `<a onclick="location.hash='#/doc/${id}'">${d.title.length>34?d.title.slice(0,34)+'…':d.title}</a>` : '';
  }).filter(Boolean);
  el.innerHTML = crumbs.join('<span class="sep">→</span>') + (crumbs.length? '<span class="sep">→</span>' : '') + `<strong>${DOCS[currentId] ? '' : ''}</strong>`;
}

/* ===================== Helpers ===================== */
function statusClass(status){
  if(status==="Existing") return "existing";
  if(status && status.toLowerCase().includes("repeal")) return "repealed";
  if(["Open for Comments","Comments Closed","Finalised"].includes(status)) return "open";
  return "neutral";
}
function badge(status){
  return `<span class="status-badge ${statusClass(status)}"><span class="dot"></span>${status}</span>`;
}
function docLink(id, label){
  const d = DOCS[id];
  if(!d) return label || id;
  return `<a class="doc-link" onclick="location.hash='#/doc/${id}'">${label || d.title}</a>`;
}
function backlinksFor(id){
  // scan all docs for relations pointing at id
  const found = {};
  Object.entries(DOCS).forEach(([oid,d])=>{
    if(oid===id) return;
    Object.entries(d.relations||{}).forEach(([relType,targets])=>{
      if(targets.includes(id)){
        const inv = REL_INVERSE[relType] || relType;
        found[inv] = found[inv] || [];
        found[inv].push(oid);
      }
    });
  });
  return found;
}

/* ===================== Views ===================== */
function viewHome(){
  const counts = {};
  TYPE_ORDER.forEach(t=>counts[t]=0);
  Object.values(DOCS).forEach(d=>counts[d.type]=(counts[d.type]||0)+1);
  const recent = Object.entries(DOCS).sort((a,b)=>b[1].year-a[1].year).slice(0,6);

  document.getElementById('view').innerHTML = `
    <div class="home-hero">
      <h1>The IRDAI Regulatory Repository</h1>
      <p>A hyperlinked reference for IRDAI regulatory material — every document links to what repeals it, what it cross-references, and what it finalises, so you can trace a provision's lineage without leaving the page.</p>
    </div>
    <div class="section-title">Browse by document type</div>
    <div class="cat-cards">
      ${TYPE_ORDER.map(t=>`
        <button class="cat-card" onclick="location.hash='#/type/${encodeURIComponent(t)}'">
          <div class="n">${counts[t]}</div>
          <div class="t">${t}</div>
        </button>`).join('')}
    </div>
    <div class="home-recent">
      <div class="section-title">Recently issued</div>
      <div class="doc-grid">
        ${recent.map(([id,d])=>docRow(id,d)).join('')}
      </div>
    </div>
  `;
}

function docRow(id,d){
  return `<a class="doc-row" onclick="location.hash='#/doc/${id}'">
    <span class="rt">${d.title}</span>
    <span class="re">${d.entity}${d.subtype && d.subtype!=='—' ? ' · '+d.subtype.split(',')[0] : ''}</span>
    <span class="ry">${d.year}</span>
    <span>${badge(d.status)}</span>
  </a>`;
}

function viewCategory(type){
  const all = Object.entries(DOCS).filter(([id,d])=>d.type===type).sort((a,b)=>b[1].year-a[1].year);
  document.getElementById('view').innerHTML = `
    <div class="cat-header">
      <h1>${type}</h1>
      <p>${all.length} document${all.length===1?'':'s'} classified under this document type.</p>
    </div>
    <div class="chiplist">
      ${TYPE_ORDER.map(t=>`<button class="chip ${t===type?'on':''}" onclick="location.hash='#/type/${encodeURIComponent(t)}'">${t}</button>`).join('')}
    </div>
    <div class="doc-grid">
      ${all.length ? all.map(([id,d])=>docRow(id,d)).join('') : '<div class="empty-note">No documents in this category yet.</div>'}
    </div>
  `;
}

function viewSearch(q){
  const query = q.toLowerCase();
  const results = Object.entries(DOCS).filter(([id,d])=>
    (d.title+" "+d.entity+" "+d.subtype+" "+d.type+" "+d.year).toLowerCase().includes(query)
  );
  document.getElementById('view').innerHTML = `
    <div class="cat-header">
      <h1>Search results</h1>
      <p>${results.length} match${results.length===1?'':'es'} for "${q}"</p>
    </div>
    <div class="doc-grid">
      ${results.length ? results.map(([id,d])=>docRow(id,d)).join('') : '<div class="empty-note">No documents matched.</div>'}
    </div>
  `;
}

function viewDoc(id){
  const d = DOCS[id];
  if(!d){
    document.getElementById('view').innerHTML = `<div class="cat-header"><h1>Not found</h1><p>No document with id "${id}".</p></div>`;
    return;
  }
  pushTrail(id);

  const rel = d.relations || {};
  const back = backlinksFor(id);
  // merge forward + backward relations into one map for display, avoiding dupes
  const combined = {};
  Object.entries(rel).forEach(([k,v])=>{ combined[k]=[...new Set([...(combined[k]||[]),...v])]; });
  Object.entries(back).forEach(([k,v])=>{ combined[k]=[...new Set([...(combined[k]||[]),...v])]; });

  const relSections = Object.entries(combined).filter(([k,v])=>v.length && REL_LABELS[k]).map(([k,ids])=>`
    <li>
      <span class="rel-tag">${REL_LABELS[k]}</span>
      ${ids.map(rid=>docLink(rid)).join(', ')}
    </li>
  `).join('');

  const provisionsHtml = d.provisions ? `
    <div class="section-title">Provisions</div>
    <table class="provisions">
      <thead><tr><th>Provision</th><th>Description</th><th>Status</th></tr></thead>
      <tbody>
        ${d.provisions.map(p=>`
          <tr>
            <td><strong>${p.ref}</strong></td>
            <td>${p.desc}</td>
            <td class="prov-status">${badge(p.status)}${p.repealedBy ? `<br><span style="font-size:11px;">→ ${docLink(p.repealedBy,'repealed by '+DOCS[p.repealedBy].title)}</span>` : ''}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  ` : '';

  document.getElementById('view').innerHTML = `
    <div class="kicker">${d.type} → ${d.entity}${d.subtype && d.subtype!=='—' ? ' → '+d.subtype : ''}</div>
    <div class="article">
      <div>
        <h1>${d.title}</h1>
        <div style="margin:10px 0 0 0;">${badge(d.status)}</div>
        <p class="lede">${d.lede}</p>

        ${provisionsHtml}

        <div class="section-title">Related documents</div>
        <ul class="link-list">
          ${relSections || '<li class="empty-note">No recorded relationships for this document.</li>'}
        </ul>
      </div>

      <aside class="infobox">
        <div class="infobox-title">At a glance</div>
        <dl>
          <dt>Document type</dt><dd>${d.type}</dd>
          <dt>Status</dt><dd>${badge(d.status)}</dd>
          <dt>Entity</dt><dd>${d.entity}</dd>
          <dt>Sub-category</dt><dd>${d.subtype}</dd>
          <dt>Year</dt><dd>${d.year}</dd>
          <dt>Filename</dt><dd class="filename">${d.type} – ${d.entity} – ${d.title.split('—')[0].trim()} – ${d.year}</dd>
        </dl>
      </aside>
    </div>
  `;
  renderTrail(id);
}

/* ===================== Router ===================== */
function router(){
  const hash = location.hash || '#/';
  const parts = hash.replace(/^#\//,'').split('/').filter(Boolean);

  if(parts.length===0){ document.getElementById('trail').innerHTML=''; viewHome(); return; }
  if(parts[0]==='type' && parts[1]){ document.getElementById('trail').innerHTML=''; viewCategory(decodeURIComponent(parts[1])); return; }
  if(parts[0]==='doc' && parts[1]){ viewDoc(decodeURIComponent(parts[1])); return; }
  if(parts[0]==='search'){
    const q = new URLSearchParams(hash.split('?')[1]||'').get('q') || '';
    document.getElementById('trail').innerHTML='';
    viewSearch(q);
    return;
  }
  document.getElementById('trail').innerHTML='';
  viewHome();
}
window.addEventListener('hashchange', router);

document.getElementById('topSearchInput').addEventListener('keydown', e=>{
  if(e.key==='Enter' && e.target.value.trim()){
    location.hash = '#/search?q='+encodeURIComponent(e.target.value.trim());
  }
});

router();
</script>
</body>
</html>
